# Install this on the separate reverse-proxy server, not the application host.
# Replace APP_SERVER_PRIVATE_IP and restrict the upstream network as appropriate.
upstream mealhouse_application {
    server APP_SERVER_PRIVATE_IP:80;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name codex-shitshow.fejlgoblin.ovh;

    # TLS certificate configuration belongs on the external proxy.

    location / {
        proxy_pass http://mealhouse_application;
        proxy_http_version 1.1;
        proxy_set_header Host codex-shitshow.fejlgoblin.ovh;
        proxy_set_header X-Forwarded-Host codex-shitshow.fejlgoblin.ovh;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }
}

