limit_req_zone $binary_remote_addr zone=mealhouse_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=mealhouse_general:10m rate=120r/m;

geo $trusted_front_proxy {
    default 0;
    192.168.0.240/32 1;
}

map "$trusted_front_proxy:$http_x_forwarded_proto" $safe_forwarded_proto {
    default http;
    "1:https" https;
}

map "$trusted_front_proxy:$http_x_forwarded_for" $safe_forwarded_for {
    default $remote_addr;
    ~^1:(.+)$ $1;
}

map "$trusted_front_proxy:$http_x_real_ip" $safe_real_ip {
    default $remote_addr;
    ~^1:(.+)$ $1;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name codex-shitshow.fejlgoblin.ovh 192.168.1.112;
    server_tokens off;

    client_max_body_size 6m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;

    location = /ops/health/ {
        access_log off;
        proxy_set_header Host codex-shitshow.fejlgoblin.ovh;
        proxy_set_header X-Forwarded-Proto $safe_forwarded_proto;
        proxy_set_header X-Forwarded-For $safe_forwarded_for;
        proxy_set_header X-Real-IP $safe_real_ip;
        proxy_pass http://127.0.0.1:8000;
    }

    location /static/ {
        alias /srv/mealhouse/staticfiles/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Content-Type-Options nosniff always;
    }

    location ~ ^/account/(login|register|password-reset|reset)/ {
        limit_req zone=mealhouse_auth burst=10 nodelay;
        proxy_set_header Host codex-shitshow.fejlgoblin.ovh;
        proxy_set_header X-Forwarded-Host codex-shitshow.fejlgoblin.ovh;
        proxy_set_header X-Forwarded-Proto $safe_forwarded_proto;
        proxy_set_header X-Forwarded-For $safe_forwarded_for;
        proxy_set_header X-Real-IP $safe_real_ip;
        proxy_pass http://127.0.0.1:8000;
    }

    location / {
        limit_req zone=mealhouse_general burst=40 nodelay;
        proxy_set_header Host codex-shitshow.fejlgoblin.ovh;
        proxy_set_header X-Forwarded-Host codex-shitshow.fejlgoblin.ovh;
        proxy_set_header X-Forwarded-Proto $safe_forwarded_proto;
        proxy_set_header X-Forwarded-For $safe_forwarded_for;
        proxy_set_header X-Real-IP $safe_real_ip;
        proxy_pass http://127.0.0.1:8000;
    }
}
