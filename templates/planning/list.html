{% extends "base.html" %}{% load i18n %}{% block content %}<h1>{% trans "Meal plans" %}</h1><div class="card-grid">{% for plan in plans %}<article class="card"><h2><a href="{% url 'planning:detail' plan.id %}">{{ plan.name }}</a></h2><p>{{ plan.start_date }} – {{ plan.end_date }}</p><p>{{ plan.household.name }}</p></article>{% empty %}<p class="empty">{% trans "No meal plans yet." %}</p>{% endfor %}</div>{% endblock %}
